<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f2027">

<title>Avbytaren Pro</title>

<style>
html, body {
touch-action: manipulation;
-webkit-user-select: none;
user-select: none;
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(160deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.container{padding:20px;}
.hidden{display:none;}

input{
padding:12px;
border-radius:12px;
border:none;
margin:6px;
background:rgba(255,255,255,0.06);
color:white;
width:85%;
}

button{
padding:14px 18px;
border-radius:14px;
border:none;
margin:6px;
font-weight:600;
}

.primary{
background:linear-gradient(90deg,#00ff9d,#00c97c);
color:black;
}

.danger{
background:#ff4d4d;
color:white;
}

.big-btn{
font-size:28px;
padding:24px;
width:90%;
}

.alert-glow{
box-shadow:0 0 25px rgba(255,0,0,0.8);
}

.list{list-style:none;padding:0;}

.player-item{
padding:12px;
margin:6px 0;
border-radius:12px;
background:rgba(255,255,255,0.06);
}

.selected-bench{border:2px solid #ff4d4d;}
.selected-field{border:2px solid #00ff9d;}

.timer{
font-size:52px;
font-weight:800;
margin:10px;
}

.next-highlight{
font-size:30px;
font-weight:800;
}

.swap-big{
font-size:34px;
font-weight:900;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal.active{
display:flex;
}

.modal-box{
background:#1e2d36;
padding:25px;
border-radius:18px;
width:80%;
max-width:350px;
}
</style>
</head>
<body>

<div class="container" id="setup">

<h2>Lägg till spelare</h2>

<input type="text" id="nameInput" placeholder="Spelarnamn">
<button class="primary" onclick="addPlayer()">Lägg till</button>

<ul id="playerList" class="list"></ul>

<input type="number" id="onFieldCount" placeholder="Antal på plan">
<input type="number" id="subInterval" placeholder="Minuter mellan byten">

<button class="primary big-btn" onclick="startMatch()">STARTA MATCH</button>

</div>

<div class="container hidden" id="match">

<div class="timer" id="matchTime">00:00</div>
<div id="subCountdown" class="timer">Nästa byte: --:--</div>

<button id="subButton" class="primary big-btn" onclick="makeSub()">BYTE</button>
<button class="danger" onclick="openModal()">Avbryt</button>

<div style="display:flex;justify-content:space-between;margin-top:20px;">
<div style="width:45%;">
<h3>Avbytare</h3>
<ul id="benchList" class="list"></ul>
</div>
<div style="width:45%;">
<h3>På plan</h3>
<ul id="fieldList" class="list"></ul>
</div>
</div>

<hr>

<h3>Nästa ut</h3>
<ul id="nextOutList" class="list"></ul>

<h3>Nästa in</h3>
<ul id="nextInList" class="list"></ul>

</div>

<div id="confirmModal" class="modal">
<div class="modal-box">
<h3>Avbryta match?</h3>
<button onclick="closeModal()">Fortsätt</button>
<button class="danger" onclick="confirmEnd()">Avbryt</button>
</div>
</div>

<script>

let players=[];
let fieldQueue=[];
let benchQueue=[];
let selectedBench=null;
let selectedField=null;
let totalSeconds=0;
let subSeconds=0;
let subIntervalSeconds=0;
let matchTimer=null;

function addPlayer(){
const input=document.getElementById("nameInput");
const name=input.value.trim();
if(!name) return;
players.push({name:name,time:0,onField:false});
input.value="";
renderPlayers();
}

function renderPlayers(){
const list=document.getElementById("playerList");
list.innerHTML="";
players.forEach(p=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
li.onclick=()=>{
p.onField=!p.onField;
li.style.background=p.onField?"#00ff9d":"rgba(255,255,255,0.06)";
li.style.color=p.onField?"black":"white";
};
list.appendChild(li);
});
}

function startMatch(){
const count=parseInt(document.getElementById("onFieldCount").value);
const interval=parseFloat(document.getElementById("subInterval").value);

if(!interval || interval<=0){
alert("Ange minuter mellan byten.");
return;
}

const starters=players.filter(p=>p.onField);
const bench=players.filter(p=>!p.onField);

if(starters.length!==count){
alert("Markera exakt "+count+" spelare.");
return;
}

fieldQueue=[...starters];
benchQueue=[...bench];
subIntervalSeconds = Math.round(interval*60);
subSeconds = subIntervalSeconds;

document.getElementById("setup").classList.add("hidden");
document.getElementById("match").classList.remove("hidden");

matchTimer=setInterval(()=>{
totalSeconds++;
fieldQueue.forEach(p=>p.time++);
document.getElementById("matchTime").innerText=formatTime(totalSeconds);

subSeconds--;
updateSubTimer();

if(subSeconds<=0){
notifySub();
}

},1000);

updateLists();
updateSubTimer();
}

function updateSubTimer(){
if(subSeconds<0) subSeconds=0;
document.getElementById("subCountdown").innerText=
"Nästa byte: "+formatTime(subSeconds);
}

function notifySub(){
document.getElementById("subButton").classList.add("alert-glow");
document.getElementById("subCountdown").innerText="DAGS FÖR BYTE!";
if(navigator.vibrate){
navigator.vibrate([200,100,200]);
}
}

function formatTime(sec){
const m=Math.floor(sec/60);
const s=sec%60;
return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function updateLists(){
const benchList=document.getElementById("benchList");
const fieldList=document.getElementById("fieldList");
const nextOut=document.getElementById("nextOutList");
const nextIn=document.getElementById("nextInList");

benchList.innerHTML="";
fieldList.innerHTML="";
nextOut.innerHTML="";
nextIn.innerHTML="";

benchQueue.forEach((p,i)=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
if(i===0) li.classList.add("next-highlight");
if(selectedBench===p) li.classList.add("selected-bench");
li.onclick=()=>{selectedBench=selectedBench===p?null:p;updateLists();}
benchList.appendChild(li);
});

fieldQueue.forEach((p,i)=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
if(i===0) li.classList.add("next-highlight");
if(selectedField===p) li.classList.add("selected-field");
li.onclick=()=>{selectedField=selectedField===p?null:p;updateLists();}
fieldList.appendChild(li);
});

fieldQueue.slice(0,3).forEach(p=>{
const li=document.createElement("li");
li.innerText=p.name;
nextOut.appendChild(li);
});

benchQueue.slice(0,3).forEach(p=>{
const li=document.createElement("li");
li.innerText=p.name;
nextIn.appendChild(li);
});
}

function makeSub(){
document.getElementById("subButton").classList.remove("alert-glow");

if(selectedBench && selectedField){
benchQueue=benchQueue.filter(p=>p!==selectedBench);
fieldQueue=fieldQueue.filter(p=>p!==selectedField);
benchQueue.push(selectedField);
fieldQueue.push(selectedBench);
selectedBench=null;
selectedField=null;
} else {
if(benchQueue.length===0) return;
const out=fieldQueue.shift();
const inn=benchQueue.shift();
benchQueue.push(out);
fieldQueue.push(inn);
}

subSeconds=subIntervalSeconds;
updateSubTimer();
updateLists();
}

function openModal(){
document.getElementById("confirmModal").classList.add("active");
}

function closeModal(){
document.getElementById("confirmModal").classList.remove("active");
}

function confirmEnd(){
clearInterval(matchTimer);
location.reload();
}

/* Blockera dubbel-tryck zoom */
let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
const now = Date.now();
if (now - lastTouchEnd <= 300) {
event.preventDefault();
}
lastTouchEnd = now;
}, false);

</script>
</body>
</html>
