<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f2027">
<title>Avbytaren Pro</title>

<style>
:root{
--bg1:#0f2027;
--bg2:#203a43;
--bg3:#2c5364;
--green:#00ff9d;
--red:#ff4d4d;
--glass:rgba(255,255,255,0.06);
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(160deg,var(--bg1),var(--bg2),var(--bg3));
color:white;
text-align:center;
}

.container{padding:20px;}
.hidden{display:none;}

input{
padding:12px;
border-radius:12px;
border:none;
margin:6px;
background:var(--glass);
color:white;
width:85%;
}

button{
padding:14px 18px;
border-radius:14px;
border:none;
margin:6px;
font-weight:600;
}

.primary{
background:linear-gradient(90deg,var(--green),#00c97c);
color:black;
}

.danger{
background:var(--red);
color:white;
}

.big-btn{
font-size:28px;
padding:24px;
width:90%;
}

.manual-mode{
background:linear-gradient(90deg,#ff0000,#ff4d4d)!important;
color:white!important;
}

.list{list-style:none;padding:0;}

.player-item{
padding:12px;
margin:6px 0;
border-radius:12px;
background:var(--glass);
}

.selected-bench{border:2px solid var(--red);}
.selected-field{border:2px solid var(--green);}

.timer{
font-size:52px;
font-weight:800;
margin:10px;
}

.next-highlight{
font-size:32px;
font-weight:800;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal.active{
display:flex;
}

.modal-box{
background:#1e2d36;
padding:25px;
border-radius:18px;
width:80%;
max-width:350px;
}
</style>
</head>
<body>

<div class="container" id="setup">

<h2>Lägg till spelare</h2>

<input type="text" id="nameInput" placeholder="Spelarnamn">
<button class="primary" onclick="addPlayer()">Lägg till</button>

<ul id="playerList" class="list"></ul>

<input type="number" id="onFieldCount" placeholder="Antal på plan">

<button class="primary big-btn" onclick="startMatch()">STARTA MATCH</button>

</div>

<div class="container hidden" id="match">

<div class="timer" id="matchTime">00:00</div>

<button id="subButton" class="primary big-btn" onclick="makeSub()">BYTE</button>
<button class="danger" onclick="openModal()">Avbryt</button>

<div style="display:flex;justify-content:space-between;margin-top:20px;">
<div style="width:45%;">
<h3>Avbytare</h3>
<ul id="benchList" class="list"></ul>
</div>
<div style="width:45%;">
<h3>På plan</h3>
<ul id="fieldList" class="list"></ul>
</div>
</div>

<hr>

<h3>Nästa ut</h3>
<ul id="nextOutList" class="list"></ul>

<h3>Nästa in</h3>
<ul id="nextInList" class="list"></ul>

</div>

<div id="confirmModal" class="modal">
<div class="modal-box">
<h3>Avbryta match?</h3>
<button onclick="closeModal()">Fortsätt</button>
<button class="danger" onclick="confirmEnd()">Avbryt</button>
</div>
</div>

<script>

let players=[];
let fieldQueue=[];
let benchQueue=[];
let selectedBench=null;
let selectedField=null;
let totalSeconds=0;
let matchTimer=null;

function addPlayer(){
const input=document.getElementById("nameInput");
const name=input.value.trim();
if(!name) return;
players.push({name:name,time:0,onField:false});
input.value="";
renderPlayers();
}

function renderPlayers(){
const list=document.getElementById("playerList");
list.innerHTML="";
players.forEach(p=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
li.onclick=()=>{
p.onField=!p.onField;
li.style.background=p.onField?"#00ff9d":"var(--glass)";
li.style.color=p.onField?"black":"white";
};
list.appendChild(li);
});
}

function startMatch(){
const count=parseInt(document.getElementById("onFieldCount").value);
const starters=players.filter(p=>p.onField);
const bench=players.filter(p=>!p.onField);

if(starters.length!==count){
alert("Markera exakt "+count+" spelare.");
return;
}

fieldQueue=[...starters];
benchQueue=[...bench];

document.getElementById("setup").classList.add("hidden");
document.getElementById("match").classList.remove("hidden");

matchTimer=setInterval(()=>{
totalSeconds++;
fieldQueue.forEach(p=>p.time++);
document.getElementById("matchTime").innerText=formatTime(totalSeconds);
},1000);

updateLists();
}

function formatTime(sec){
const m=Math.floor(sec/60);
const s=sec%60;
return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function updateLists(){
const benchList=document.getElementById("benchList");
const fieldList=document.getElementById("fieldList");
const nextOut=document.getElementById("nextOutList");
const nextIn=document.getElementById("nextInList");

benchList.innerHTML="";
fieldList.innerHTML="";
nextOut.innerHTML="";
nextIn.innerHTML="";

benchQueue.forEach((p,i)=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
if(i===0) li.classList.add("next-highlight");
if(selectedBench===p) li.classList.add("selected-bench");
li.onclick=()=>{selectedBench=selectedBench===p?null:p;updateLists();}
benchList.appendChild(li);
});

fieldQueue.forEach((p,i)=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
if(i===0) li.classList.add("next-highlight");
if(selectedField===p) li.classList.add("selected-field");
li.onclick=()=>{selectedField=selectedField===p?null:p;updateLists();}
fieldList.appendChild(li);
});

fieldQueue.slice(0,3).forEach(p=>{
const li=document.createElement("li");
li.innerText=p.name;
nextOut.appendChild(li);
});

benchQueue.slice(0,3).forEach(p=>{
const li=document.createElement("li");
li.innerText=p.name;
nextIn.appendChild(li);
});

const btn=document.getElementById("subButton");
if(selectedBench&&selectedField){
btn.innerText="MANUELLT BYTE";
btn.classList.add("manual-mode");
} else {
btn.innerText="BYTE";
btn.classList.remove("manual-mode");
}
}

function makeSub(){
if(selectedBench && selectedField){
benchQueue=benchQueue.filter(p=>p!==selectedBench);
fieldQueue=fieldQueue.filter(p=>p!==selectedField);
benchQueue.push(selectedField);
fieldQueue.push(selectedBench);
selectedBench=null;
selectedField=null;
} else {
if(benchQueue.length===0) return;
const out=fieldQueue.shift();
const inn=benchQueue.shift();
benchQueue.push(out);
fieldQueue.push(inn);
}
updateLists();
}

function openModal(){
document.getElementById("confirmModal").classList.add("active");
}

function closeModal(){
document.getElementById("confirmModal").classList.remove("active");
}

function confirmEnd(){
clearInterval(matchTimer);
location.reload();
}

</script>
</body>
</html>
