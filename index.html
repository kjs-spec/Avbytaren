<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0,
maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f2027">

<title>Avbytaren Pro</title>

<style>
html,body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(160deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
touch-action:manipulation;
-webkit-user-select:none;
user-select:none;
}

.container{padding:20px;}
.hidden{display:none;}

input{
padding:12px;
border-radius:12px;
border:none;
margin:6px;
background:rgba(255,255,255,0.08);
color:white;
width:85%;
}

button{
padding:14px 18px;
border-radius:14px;
border:none;
margin:8px;
font-weight:700;
}

.primary{
background:linear-gradient(90deg,#00ff9d,#00c97c);
color:black;
}

.danger{
background:#ff4d4d;
color:white;
}

.big-btn{
font-size:26px;
padding:22px;
width:90%;
}

.timer{
font-size:48px;
font-weight:800;
margin:10px;
}

.swap-box{
margin-top:20px;
padding:18px;
border-radius:18px;
background:rgba(255,255,255,0.08);
}

.swap-name{
font-size:32px;
font-weight:900;
margin:8px 0;
}

.out{color:#ff4d4d;}
.in{color:#00ff9d;}

.list{
list-style:none;
padding:0;
}

.player-item{
padding:10px;
margin:5px 0;
border-radius:10px;
background:rgba(255,255,255,0.08);
}

.selected{
outline:3px solid yellow;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.modal.active{display:flex;}

.modal-box{
background:#1e2d36;
padding:25px;
border-radius:18px;
width:80%;
max-width:350px;
}
</style>
</head>
<body>

<!-- SETUP -->
<div class="container" id="setup">
<h2>Lägg till spelare</h2>

<input type="text" id="nameInput" placeholder="Spelarnamn">
<button class="primary" onclick="addPlayer()">Lägg till</button>

<ul id="playerList" class="list"></ul>

<input type="number" id="onFieldCount" placeholder="Antal på plan">
<input type="number" id="subInterval" placeholder="Minuter mellan byten">

<button class="primary big-btn" onclick="startMatch()">STARTA MATCH</button>
</div>

<!-- MATCH -->
<div class="container hidden" id="match">

<div class="timer" id="matchTime">00:00</div>
<div class="timer" id="subTimer">Nästa byte: --:--</div>

<!-- TYDLIG BYTE-RUTA -->
<div class="swap-box">
<div class="swap-name out" id="nextOut">UT: -</div>
<div class="swap-name in" id="nextIn">IN: -</div>
</div>

<button id="subButton" class="primary big-btn" onclick="makeSub()">GENOMFÖR BYTE</button>
<button class="danger" onclick="openModal()">Avbryt</button>

<hr>

<div style="display:flex;justify-content:space-between;">
<div style="width:48%;">
<h3 class="out">På plan</h3>
<ul id="fieldList" class="list"></ul>
</div>
<div style="width:48%;">
<h3 class="in">Avbytare</h3>
<ul id="benchList" class="list"></ul>
</div>
</div>

</div>

<!-- STATISTIK -->
<div class="container hidden" id="stats">
<h2>Matchstatistik</h2>
<ul id="statsList" class="list"></ul>
<button class="primary big-btn" onclick="resetApp()">Ny match</button>
</div>

<!-- MODAL -->
<div id="confirmModal" class="modal">
<div class="modal-box">
<h3>Avbryta match?</h3>
<button onclick="closeModal()">Fortsätt</button>
<button class="danger" onclick="confirmEnd()">Avsluta</button>
</div>
</div>

<script>
let players=[];
let fieldQueue=[];
let benchQueue=[];
let totalSeconds=0;
let subSeconds=0;
let subIntervalSeconds=0;
let matchTimer=null;
let manualOut=null;
let manualIn=null;

/* LÄGG TILL SPELARE */
function addPlayer(){
const name=nameInput.value.trim();
if(!name) return;
players.push({name:name,time:0,onField:false});
nameInput.value="";
renderPlayers();
}

function renderPlayers(){
playerList.innerHTML="";
players.forEach(p=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
li.onclick=()=>{
p.onField=!p.onField;
li.style.background=p.onField?"#00ff9d":"rgba(255,255,255,0.08)";
li.style.color=p.onField?"black":"white";
};
playerList.appendChild(li);
});
}

/* START MATCH */
function startMatch(){
const count=parseInt(onFieldCount.value);
const interval=parseFloat(subInterval.value);

if(!interval || interval<=0){
alert("Ange minuter mellan byten.");
return;
}

const starters=players.filter(p=>p.onField);
const bench=players.filter(p=>!p.onField);

if(starters.length!==count){
alert("Markera exakt "+count+" spelare.");
return;
}

fieldQueue=[...starters];
benchQueue=[...bench];
subIntervalSeconds=Math.round(interval*60);
subSeconds=subIntervalSeconds;

setup.classList.add("hidden");
match.classList.remove("hidden");

matchTimer=setInterval(()=>{
totalSeconds++;
fieldQueue.forEach(p=>p.time++);
matchTime.innerText=formatTime(totalSeconds);

subSeconds--;
updateSubTimer();
if(subSeconds<=0) notifySub();
},1000);

updateLists();
updateSwapBox();
}

/* TIMER */
function formatTime(sec){
const m=Math.floor(sec/60);
const s=sec%60;
return (m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function updateSubTimer(){
if(subSeconds<0) subSeconds=0;
subTimer.innerText="Nästa byte: "+formatTime(subSeconds);
}

function notifySub(){
subButton.style.boxShadow="0 0 25px red";
if(navigator.vibrate) navigator.vibrate([200,100,200]);
}

/* LISTOR */
function updateLists(){
fieldList.innerHTML="";
benchList.innerHTML="";

fieldQueue.forEach((p,i)=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
li.style.color="#ff4d4d";
if(i===0 && !manualOut) li.style.fontWeight="900";
if(p===manualOut) li.classList.add("selected");
li.onclick=()=>{
manualOut=p===manualOut?null:p;
updateSwapBox();
updateLists();
};
fieldList.appendChild(li);
});

benchQueue.forEach((p,i)=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name;
li.style.color="#00ff9d";
if(i===0 && !manualIn) li.style.fontWeight="900";
if(p===manualIn) li.classList.add("selected");
li.onclick=()=>{
manualIn=p===manualIn?null:p;
updateSwapBox();
updateLists();
};
benchList.appendChild(li);
});
}

/* BYTE-RUTA */
function updateSwapBox(){
let out=manualOut || fieldQueue[0];
let inn=manualIn || benchQueue[0];

nextOut.innerText="UT: "+(out?out.name:"-");
nextIn.innerText="IN: "+(inn?inn.name:"-");
}

/* BYTE */
function makeSub(){
subButton.style.boxShadow="none";

let out=manualOut || fieldQueue[0];
let inn=manualIn || benchQueue[0];

if(!out || !inn) return;

fieldQueue=fieldQueue.filter(p=>p!==out);
benchQueue=benchQueue.filter(p=>p!==inn);

benchQueue.push(out);
fieldQueue.push(inn);

manualOut=null;
manualIn=null;

subSeconds=subIntervalSeconds;
updateSubTimer();
updateLists();
updateSwapBox();
}

/* MODAL */
function openModal(){confirmModal.classList.add("active");}
function closeModal(){confirmModal.classList.remove("active");}

function confirmEnd(){
clearInterval(matchTimer);
match.classList.add("hidden");
stats.classList.remove("hidden");

statsList.innerHTML="";
players.sort((a,b)=>b.time-a.time)
.forEach(p=>{
const li=document.createElement("li");
li.className="player-item";
li.innerText=p.name+" – "+formatTime(p.time);
statsList.appendChild(li);
});

confirmModal.classList.remove("active");
}

function resetApp(){location.reload();}

/* STOPPA DUBBELZOOM */
let lastTouchEnd=0;
document.addEventListener('touchend',function(e){
const now=Date.now();
if(now-lastTouchEnd<=300){e.preventDefault();}
lastTouchEnd=now;
},false);
</script>
</body>
</html>
